<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Download Aplikasi Excel</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Bootstrap CDN -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container vh-100 d-flex justify-content-center align-items-center">

  <div class="card shadow p-4" style="max-width:420px;width:100%">

    <h4 class="text-center mb-2">Download Aplikasi</h4>
    <p class="text-center text-muted mb-3">
      Pilih aplikasi dan masukkan kode
    </p>

    <!-- SELECT APP -->
    <select id="app" class="form-select mb-3">
	  <option value="">-- Pilih Aplikasi --</option>
	  <option value="dapodik">Excel Dapodik v2.0</option>
	  <option value="exarkas">Exarkas v2.1</option>
	  <option value="rapor">RaporSD 2025 v2.0</option>
	</select>


    <!-- INPUT KODE -->
    <input 
      type="text" 
      id="kode"
      class="form-control mb-3"
      placeholder="Masukkan kode download"
      onkeydown="if(event.key==='Enter') cekKode()">

    <!-- BUTTON -->
    <button 
      id="btnDownload"
      class="btn btn-primary w-100"
      onclick="cekKode()">

      <span id="btnText">Download</span>
      <span id="loader" 
        class="spinner-border spinner-border-sm ms-2 d-none"></span>

    </button>

    <!-- MESSAGE -->
    <div id="msg" class="text-center fw-semibold mt-3"></div>

  </div>

</div>
<!-- Toast Container -->
<div class="toast-container position-fixed top-0 end-0 p-3">

  <div id="liveToast" class="toast align-items-center border-0" role="alert">
    <div class="d-flex">

      <div id="toastBody" class="toast-body">
        Pesan
      </div>

      <button type="button" 
        class="btn-close btn-close-white me-2 m-auto" 
        data-bs-dismiss="toast"></button>

    </div>
  </div>

</div>

<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
